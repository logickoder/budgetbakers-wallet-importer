name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Resolve publish version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")

          echo "package_name=$NAME" >> "$GITHUB_OUTPUT"
          echo "initial_version=$VERSION" >> "$GITHUB_OUTPUT"

          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION already exists on npm. Bumping minor version..."
            npm version minor --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json
            git commit -m "chore(release): bump version to $NEW_VERSION [skip ci]"
            git push origin HEAD:main

            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        run: pnpm publish --no-git-checks --access public

      - name: Publish summary
        run: |
          echo "Published ${{ steps.version.outputs.package_name }}@${{ steps.version.outputs.version }}"
          echo "Version bumped: ${{ steps.version.outputs.bumped }}"
